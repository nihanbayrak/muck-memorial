<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Memory Tree — Muck Memorial</title>
    <meta name="description" content="A living tree of words and memories for Muck">

    <!-- Favicon -->
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌳</text></svg>">

    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg: #0D0D0D;
            --bg-subtle: #151515;
            --trunk: #5c4033;
            --trunk-light: #7a5c47;
            --leaf-1: #e8c4a0;
            --leaf-2: #d4a574;
            --leaf-3: #c49a6c;
            --glow: #e8c4a0;
            --gold: #e8c4a0;
            --gold-dim: #8a6d4b;
            --text: #e8e4d9;
            --text-dim: #5a5650;
            --accent: #e8c4a0;
            --node-shadow: rgba(232, 196, 160, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Playfair Display', serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .ambient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            background:
                radial-gradient(ellipse at 30% 70%, rgba(232, 196, 160, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 30%, rgba(232, 196, 160, 0.03) 0%, transparent 50%);
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 20px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(to bottom, rgba(13, 13, 13, 0.95) 0%, rgba(13, 13, 13, 0.6) 70%, transparent 100%);
            pointer-events: none;
        }

        .header>* {
            pointer-events: auto;
        }

        .nav-back {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: rgba(232, 196, 160, 0.7);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            padding: 10px 20px;
            border: 1px solid rgba(232, 196, 160, 0.15);
            border-radius: 4px;
            backdrop-filter: blur(10px);
        }

        .nav-back:hover {
            color: #E8C4A0;
            border-color: rgba(232, 196, 160, 0.4);
            background: rgba(232, 196, 160, 0.08);
            transform: translateX(-4px);
        }

        .nav-title {
            text-align: center;
        }

        .nav-title-text {
            font-family: 'Playfair Display', serif;
            font-size: 16px;
            color: rgba(232, 196, 160, 0.5);
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .nav-title-sub {
            font-family: 'Inter', sans-serif;
            font-size: 10px;
            color: var(--text-dim);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 2px;
        }

        .stats {
            display: flex;
            gap: 16px;
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            color: var(--text-dim);
            letter-spacing: 0.05em;
        }

        .stat-value {
            color: var(--accent);
            font-weight: 500;
        }

        /* Input area */
        .input-area {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            width: min(560px, calc(100% - 32px));
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            background: rgba(21, 21, 21, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(232, 196, 160, 0.15);
            border-radius: 12px;
            padding: 4px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .input-wrapper:focus-within {
            border-color: rgba(232, 196, 160, 0.35);
            box-shadow: 0 0 30px rgba(232, 196, 160, 0.06);
        }

        .input-wrapper input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--text);
            font-family: 'Playfair Display', serif;
            font-size: 15px;
            padding: 14px 18px;
        }

        .input-wrapper input::placeholder {
            color: var(--text-dim);
            font-style: italic;
        }

        .btn-add {
            background: linear-gradient(135deg, rgba(232, 196, 160, 0.25), rgba(232, 196, 160, 0.15));
            border: 1px solid rgba(232, 196, 160, 0.2);
            color: var(--gold);
            width: 44px;
            height: 44px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            flex-shrink: 0;
            margin-right: 2px;
        }

        .btn-add:hover {
            transform: scale(1.05);
            background: linear-gradient(135deg, rgba(232, 196, 160, 0.35), rgba(232, 196, 160, 0.2));
            box-shadow: 0 0 20px rgba(232, 196, 160, 0.15);
        }

        .btn-add svg {
            width: 20px;
            height: 20px;
        }

        /* Tooltip */
        .tooltip {
            position: fixed;
            z-index: 200;
            background: rgba(21, 21, 21, 0.95);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(232, 196, 160, 0.2);
            border-radius: 10px;
            padding: 14px 18px;
            max-width: 300px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.25s;
            font-size: 14px;
            line-height: 1.5;
            color: var(--text);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .tooltip.visible {
            opacity: 1;
        }

        .tooltip-author {
            font-family: 'Inter', sans-serif;
            font-size: 10px;
            color: var(--gold);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .tooltip-time {
            font-family: 'Inter', sans-serif;
            font-size: 10px;
            color: var(--text-dim);
            margin-top: 8px;
        }

        /* Intro hint */
        .intro-hint {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            color: var(--text-dim);
            font-family: 'Playfair Display', serif;
            font-size: 14px;
            font-style: italic;
            animation: fadeInUp 1s ease 0.5s both;
            text-align: center;
            white-space: nowrap;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        /* Zoom controls */
        .zoom-controls {
            position: fixed;
            bottom: 100px;
            right: 20px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .zoom-btn {
            width: 36px;
            height: 36px;
            background: rgba(21, 21, 21, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(232, 196, 160, 0.12);
            border-radius: 8px;
            color: var(--text-dim);
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .zoom-btn:hover {
            border-color: rgba(232, 196, 160, 0.3);
            color: var(--accent);
        }

        /* Loading */
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: #0D0D0D;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.6s;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-content {
            text-align: center;
        }

        .loading-icon {
            font-size: 48px;
            animation: pulse 1.5s ease-in-out infinite;
            margin-bottom: 20px;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 0.6;
            }

            50% {
                transform: scale(1.1);
                opacity: 1;
            }
        }

        .loading-text {
            font-family: 'Playfair Display', serif;
            font-size: 14px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(232, 196, 160, 0.5);
        }

        /* Mobile */
        @media (max-width: 768px) {
            .header {
                padding: 16px 16px;
            }

            .nav-back {
                font-size: 11px;
                padding: 8px 12px;
                letter-spacing: 1px;
            }

            .nav-title-text {
                font-size: 12px;
                letter-spacing: 2px;
            }

            .nav-title-sub {
                display: none;
            }

            .stats {
                gap: 10px;
                font-size: 9px;
            }

            .input-wrapper input {
                font-size: 14px;
                padding: 12px 14px;
            }

            .intro-hint {
                font-size: 12px;
                bottom: 90px;
            }

            .zoom-controls {
                bottom: 90px;
                right: 12px;
            }

            .zoom-btn {
                width: 32px;
                height: 32px;
                font-size: 14px;
            }
        }
    </style>
</head>

<body>

    <!-- Loading -->
    <div class="loading-overlay" id="loading">
        <div class="loading-content">
            <div class="loading-icon">🌳</div>
            <div class="loading-text">Growing the tree...</div>
        </div>
    </div>

    <div class="ambient-bg"></div>

    <!-- Header -->
    <div class="header">
        <a href="/" class="nav-back">
            <span>←</span>
            <span>Memorial</span>
        </a>
        <div class="nav-title">
            <div class="nav-title-text">Memory Tree</div>
            <div class="nav-title-sub">Every word grows a leaf</div>
        </div>
        <div class="stats">
            <span>🍃 <span class="stat-value" id="stat-nodes">0</span></span>
            <span>🌿 <span class="stat-value" id="stat-edges">0</span></span>
        </div>
    </div>

    <!-- Canvas -->
    <div id="canvas-container">
        <canvas id="tree-canvas"></canvas>
    </div>

    <!-- Tooltip -->
    <div class="tooltip" id="tooltip">
        <div class="tooltip-author" id="tooltip-author"></div>
        <div id="tooltip-text"></div>
        <div class="tooltip-time" id="tooltip-time"></div>
    </div>

    <!-- Intro hint -->
    <div class="intro-hint" id="intro-hint">
        Leave a word for Muck — watch the tree grow ✦
    </div>

    <!-- Input -->
    <div class="input-area">
        <div class="input-wrapper">
            <input type="text" id="sentence-input" placeholder="Write a message for Muck..." />
            <button class="btn-add" id="btn-add" title="Add to tree">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <line x1="12" y1="5" x2="12" y2="19" />
                    <line x1="5" y1="12" x2="19" y2="12" />
                </svg>
            </button>
        </div>
    </div>

    <!-- Zoom -->
    <div class="zoom-controls">
        <button class="zoom-btn" id="zoom-in">+</button>
        <button class="zoom-btn" id="zoom-out">−</button>
        <button class="zoom-btn" id="zoom-fit" title="Fit">◎</button>
    </div>

    <script>
        // ============================================
        // MUCK MEMORY TREE — Living Word Graph
        // ============================================

        const canvas = document.getElementById('tree-canvas');
        const ctx = canvas.getContext('2d');
        const tooltip = document.getElementById('tooltip');
        const input = document.getElementById('sentence-input');
        const introHint = document.getElementById('intro-hint');
        const loading = document.getElementById('loading');

        // State
        let nodes = [];
        let edges = [];
        let nextId = 1;
        let hoveredNode = null;
        let draggedNode = null;
        let dragOffset = { x: 0, y: 0 };

        // Camera
        let camera = { x: 0, y: 0, zoom: 1 };
        let isPanning = false;
        let panStart = { x: 0, y: 0 };
        let camStart = { x: 0, y: 0 };

        // Animation
        let glowNodes = [];
        let particles = [];

        // Resize
        function resize() {
            canvas.width = window.innerWidth * devicePixelRatio;
            canvas.height = window.innerHeight * devicePixelRatio;
            ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
        }
        window.addEventListener('resize', resize);
        resize();

        // Warm color palette for depth
        const depthColors = [
            '#e8c4a0', // root — warm amber
            '#d4a574', // depth 1
            '#c49a6c', // depth 2
            '#b8956a', // depth 3
            '#a78b6a', // depth 4
            '#c9a84c', // depth 5 — gold
            '#d4a574', // depth 6
            '#e8c4a0', // depth 7
        ];

        function getNodeColor(depth) {
            return depthColors[depth % depthColors.length];
        }

        // Create node
        function createNode(text, author, parentId = null, timestamp = null) {
            const parent = parentId != null ? nodes.find(n => n.id === parentId) : null;
            const depth = parent ? parent.depth + 1 : 0;

            let x, y;
            if (parent) {
                const angle = Math.random() * Math.PI * 2;
                const dist = 90 + Math.random() * 50;
                x = parent.x + Math.cos(angle) * dist;
                y = parent.y + Math.sin(angle) * dist;
            } else {
                x = (window.innerWidth / 2 - camera.x) / camera.zoom;
                y = (window.innerHeight / 2 - camera.y) / camera.zoom;
            }

            const node = {
                id: nextId++,
                text, author,
                depth, parentId,
                x, y,
                vx: 0, vy: 0,
                radius: Math.max(16, Math.min(30, 12 + text.length * 0.2)),
                color: getNodeColor(depth),
                createdAt: timestamp || Date.now(),
            };

            nodes.push(node);
            if (parentId != null) edges.push({ from: parentId, to: node.id });
            glowNodes.push({ id: node.id, startTime: Date.now() });

            for (let i = 0; i < 6; i++) {
                particles.push({
                    x: node.x, y: node.y,
                    vx: (Math.random() - 0.5) * 2.5,
                    vy: (Math.random() - 0.5) * 2.5,
                    life: 1, color: node.color,
                });
            }

            updateStats();
            return node;
        }

        // Force simulation
        function simulate() {
            const repulsion = 3000;
            const edgeLength = 120;
            const edgeStrength = 0.04;
            const damping = 0.88;
            const gravity = 0.002;

            let cx = 0, cy = 0;
            nodes.forEach(n => { cx += n.x; cy += n.y; });
            if (nodes.length) { cx /= nodes.length; cy /= nodes.length; }

            for (let i = 0; i < nodes.length; i++) {
                const a = nodes[i];
                if (a === draggedNode) continue;

                let fx = 0, fy = 0;

                for (let j = 0; j < nodes.length; j++) {
                    if (i === j) continue;
                    const b = nodes[j];
                    let dx = a.x - b.x;
                    let dy = a.y - b.y;
                    let dist = Math.sqrt(dx * dx + dy * dy) || 1;
                    let force = repulsion / (dist * dist);
                    fx += (dx / dist) * force;
                    fy += (dy / dist) * force;
                }

                edges.forEach(e => {
                    let other = null;
                    if (e.from === a.id) other = nodes.find(n => n.id === e.to);
                    else if (e.to === a.id) other = nodes.find(n => n.id === e.from);
                    if (!other) return;

                    let dx = other.x - a.x;
                    let dy = other.y - a.y;
                    let dist = Math.sqrt(dx * dx + dy * dy) || 1;
                    let force = (dist - edgeLength) * edgeStrength;
                    fx += (dx / dist) * force;
                    fy += (dy / dist) * force;
                });

                fx += (cx - a.x) * gravity;
                fy += (cy - a.y) * gravity;

                a.vx = (a.vx + fx) * damping;
                a.vy = (a.vy + fy) * damping;
                a.x += a.vx;
                a.y += a.vy;
            }
        }

        // Coordinate transforms
        function worldToScreen(wx, wy) {
            return { x: wx * camera.zoom + camera.x, y: wy * camera.zoom + camera.y };
        }

        function screenToWorld(sx, sy) {
            return { x: (sx - camera.x) / camera.zoom, y: (sy - camera.y) / camera.zoom };
        }

        // Draw
        function draw() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            ctx.clearRect(0, 0, w, h);

            // Draw edges (branches)
            edges.forEach(e => {
                const from = nodes.find(n => n.id === e.from);
                const to = nodes.find(n => n.id === e.to);
                if (!from || !to) return;

                const p1 = worldToScreen(from.x, from.y);
                const p2 = worldToScreen(to.x, to.y);
                const mx = (p1.x + p2.x) / 2;
                const my = (p1.y + p2.y) / 2 - 12 * camera.zoom;

                ctx.beginPath();
                ctx.moveTo(p1.x, p1.y);
                ctx.quadraticCurveTo(mx, my, p2.x, p2.y);

                const grad = ctx.createLinearGradient(p1.x, p1.y, p2.x, p2.y);
                grad.addColorStop(0, from.color + '30');
                grad.addColorStop(1, to.color + '50');
                ctx.strokeStyle = grad;
                ctx.lineWidth = Math.max(1.5, 2 * camera.zoom);
                ctx.stroke();
            });

            // Particles
            particles = particles.filter(p => {
                p.x += p.vx; p.y += p.vy; p.life -= 0.02;
                if (p.life <= 0) return false;
                const sp = worldToScreen(p.x, p.y);
                ctx.beginPath();
                ctx.arc(sp.x, sp.y, 2 * p.life * camera.zoom, 0, Math.PI * 2);
                ctx.fillStyle = p.color + Math.floor(p.life * 60).toString(16).padStart(2, '0');
                ctx.fill();
                return true;
            });

            // Draw nodes
            const now = Date.now();
            nodes.forEach(node => {
                const sp = worldToScreen(node.x, node.y);
                const r = node.radius * camera.zoom;

                // Glow for new nodes
                const glow = glowNodes.find(g => g.id === node.id);
                if (glow) {
                    const elapsed = (now - glow.startTime) / 1000;
                    if (elapsed < 2) {
                        const alpha = Math.max(0, 0.4 - elapsed * 0.2);
                        const size = r + elapsed * 25 * camera.zoom;
                        ctx.beginPath();
                        ctx.arc(sp.x, sp.y, size, 0, Math.PI * 2);
                        ctx.fillStyle = node.color + Math.floor(alpha * 255).toString(16).padStart(2, '0');
                        ctx.fill();
                    } else {
                        glowNodes = glowNodes.filter(g => g.id !== node.id);
                    }
                }

                // Hover glow
                if (hoveredNode === node) {
                    ctx.beginPath();
                    ctx.arc(sp.x, sp.y, r + 8, 0, Math.PI * 2);
                    ctx.fillStyle = node.color + '18';
                    ctx.fill();
                    ctx.strokeStyle = node.color + '40';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }

                // Main node
                const grad = ctx.createRadialGradient(sp.x - r * 0.3, sp.y - r * 0.3, r * 0.1, sp.x, sp.y, r);
                grad.addColorStop(0, node.color + 'cc');
                grad.addColorStop(0.7, node.color + '88');
                grad.addColorStop(1, node.color + '33');

                ctx.beginPath();
                ctx.arc(sp.x, sp.y, r, 0, Math.PI * 2);
                ctx.fillStyle = grad;
                ctx.fill();

                // Inner ring
                ctx.beginPath();
                ctx.arc(sp.x, sp.y, r * 0.65, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(255,255,255,0.06)';
                ctx.lineWidth = 1;
                ctx.stroke();

                // Label
                if (camera.zoom > 0.4) {
                    const maxChars = Math.floor(r / (4.5 * camera.zoom));
                    let label = node.text;
                    if (label.length > maxChars) label = label.substring(0, maxChars) + '…';

                    ctx.font = `${Math.max(9, 10 * camera.zoom)}px 'Inter', sans-serif`;
                    ctx.fillStyle = '#ffffffbb';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(label, sp.x, sp.y);
                }
            });

            // Ambient floating dots
            const time = now * 0.001;
            for (let i = 0; i < 15; i++) {
                const ax = Math.sin(time * 0.2 + i * 1.7) * w * 0.4 + w / 2;
                const ay = Math.cos(time * 0.15 + i * 2.3) * h * 0.4 + h / 2;
                const alpha = 0.025 + Math.sin(time + i) * 0.015;
                ctx.beginPath();
                ctx.arc(ax, ay, 1.5, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(232, 196, 160, ${alpha})`;
                ctx.fill();
            }
        }

        // Main loop
        function loop() { simulate(); draw(); requestAnimationFrame(loop); }
        loop();

        // Interaction
        function getNodeAt(sx, sy) {
            const wp = screenToWorld(sx, sy);
            for (let i = nodes.length - 1; i >= 0; i--) {
                const n = nodes[i];
                const dx = wp.x - n.x;
                const dy = wp.y - n.y;
                if (dx * dx + dy * dy < n.radius * n.radius) return n;
            }
            return null;
        }

        // Mouse events
        canvas.addEventListener('mousemove', (e) => {
            if (isPanning) {
                camera.x = camStart.x + (e.clientX - panStart.x);
                camera.y = camStart.y + (e.clientY - panStart.y);
                return;
            }
            if (draggedNode) {
                const wp = screenToWorld(e.clientX, e.clientY);
                draggedNode.x = wp.x + dragOffset.x;
                draggedNode.y = wp.y + dragOffset.y;
                draggedNode.vx = 0; draggedNode.vy = 0;
                return;
            }

            const node = getNodeAt(e.clientX, e.clientY);
            hoveredNode = node;
            canvas.style.cursor = node ? 'pointer' : 'grab';

            if (node) {
                const authorName = node.author && node.author !== 'Anonymous' ? node.author : '';
                tooltip.querySelector('#tooltip-author').textContent = authorName;
                tooltip.querySelector('#tooltip-text').textContent = node.text;
                tooltip.querySelector('#tooltip-time').textContent = new Date(node.createdAt).toLocaleString();
                tooltip.style.left = Math.min(e.clientX + 16, window.innerWidth - 320) + 'px';
                tooltip.style.top = (e.clientY - 10) + 'px';
                tooltip.classList.add('visible');
            } else {
                tooltip.classList.remove('visible');
            }
        });

        canvas.addEventListener('mousedown', (e) => {
            const node = getNodeAt(e.clientX, e.clientY);
            if (node) {
                const wp = screenToWorld(e.clientX, e.clientY);
                draggedNode = node;
                dragOffset.x = node.x - wp.x;
                dragOffset.y = node.y - wp.y;
            } else {
                isPanning = true;
                panStart = { x: e.clientX, y: e.clientY };
                camStart = { x: camera.x, y: camera.y };
                canvas.style.cursor = 'grabbing';
            }
        });

        canvas.addEventListener('mouseup', () => {
            draggedNode = null;
            isPanning = false;
            canvas.style.cursor = hoveredNode ? 'pointer' : 'grab';
        });

        // Touch events for mobile
        let touchStartDist = 0;
        let touchStartZoom = 1;

        canvas.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                const t = e.touches[0];
                const node = getNodeAt(t.clientX, t.clientY);
                if (node) {
                    const wp = screenToWorld(t.clientX, t.clientY);
                    draggedNode = node;
                    dragOffset.x = node.x - wp.x;
                    dragOffset.y = node.y - wp.y;
                } else {
                    isPanning = true;
                    panStart = { x: t.clientX, y: t.clientY };
                    camStart = { x: camera.x, y: camera.y };
                }
            } else if (e.touches.length === 2) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                touchStartDist = Math.sqrt(dx * dx + dy * dy);
                touchStartZoom = camera.zoom;
            }
            e.preventDefault();
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            if (e.touches.length === 1) {
                const t = e.touches[0];
                if (draggedNode) {
                    const wp = screenToWorld(t.clientX, t.clientY);
                    draggedNode.x = wp.x + dragOffset.x;
                    draggedNode.y = wp.y + dragOffset.y;
                    draggedNode.vx = 0; draggedNode.vy = 0;
                } else if (isPanning) {
                    camera.x = camStart.x + (t.clientX - panStart.x);
                    camera.y = camStart.y + (t.clientY - panStart.y);
                }
            } else if (e.touches.length === 2) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                camera.zoom = Math.max(0.2, Math.min(4, touchStartZoom * (dist / touchStartDist)));
            }
            e.preventDefault();
        }, { passive: false });

        canvas.addEventListener('touchend', () => {
            draggedNode = null;
            isPanning = false;
        });

        // Zoom (mouse wheel)
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            const zoomFactor = e.deltaY > 0 ? 0.92 : 1.08;
            const newZoom = Math.max(0.15, Math.min(4, camera.zoom * zoomFactor));
            const wx = (e.clientX - camera.x) / camera.zoom;
            const wy = (e.clientY - camera.y) / camera.zoom;
            camera.zoom = newZoom;
            camera.x = e.clientX - wx * camera.zoom;
            camera.y = e.clientY - wy * camera.zoom;
        }, { passive: false });

        document.getElementById('zoom-in').addEventListener('click', () => {
            camera.zoom = Math.min(4, camera.zoom * 1.3);
        });
        document.getElementById('zoom-out').addEventListener('click', () => {
            camera.zoom = Math.max(0.15, camera.zoom * 0.7);
        });
        document.getElementById('zoom-fit').addEventListener('click', fitCamera);

        function fitCamera() {
            if (!nodes.length) return;
            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            nodes.forEach(n => {
                minX = Math.min(minX, n.x - 50);
                maxX = Math.max(maxX, n.x + 50);
                minY = Math.min(minY, n.y - 50);
                maxY = Math.max(maxY, n.y + 50);
            });
            const bw = maxX - minX;
            const bh = maxY - minY;
            const w = window.innerWidth;
            const h = window.innerHeight;
            camera.zoom = Math.min(w / bw, h / bh) * 0.75;
            camera.x = w / 2 - ((minX + maxX) / 2) * camera.zoom;
            camera.y = h / 2 - ((minY + maxY) / 2) * camera.zoom;
        }

        // --- Add message to tree AND server ---
        async function addMessage(text) {
            if (!text.trim()) return;
            introHint.style.display = 'none';

            try {
                const res = await fetch('/api/messages', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text.trim() })
                });

                if (res.ok) {
                    const msg = await res.json();
                    // Attach to a random existing node or be root
                    const parentId = nodes.length > 0 ? nodes[Math.floor(Math.random() * nodes.length)].id : null;
                    createNode(msg.text, msg.author, parentId, msg.timestamp);
                }
            } catch (err) {
                console.error('Failed to send message:', err);
                // Still add locally
                const parentId = nodes.length > 0 ? nodes[Math.floor(Math.random() * nodes.length)].id : null;
                createNode(text.trim(), '', parentId);
            }

            input.value = '';
        }

        document.getElementById('btn-add').addEventListener('click', () => addMessage(input.value));
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') addMessage(input.value);
        });

        // Stats
        function updateStats() {
            document.getElementById('stat-nodes').textContent = nodes.length;
            document.getElementById('stat-edges').textContent = edges.length;
        }

        // --- Load existing messages from API ---
        async function loadMessages() {
            try {
                const res = await fetch('/api/messages');
                const messages = await res.json();

                if (messages.length === 0) {
                    // Seed with a root node
                    createNode('Muck 🐾', 'Memorial', null, Date.now());
                } else {
                    // First message is root
                    const root = createNode(messages[messages.length - 1].text, messages[messages.length - 1].author, null, messages[messages.length - 1].timestamp);

                    // Build tree from remaining messages
                    for (let i = messages.length - 2; i >= 0; i--) {
                        const msg = messages[i];
                        const parentId = nodes[Math.floor(Math.random() * nodes.length)].id;
                        createNode(msg.text, msg.author, parentId, msg.timestamp);
                    }
                }

                // Fit camera after tree is built
                setTimeout(() => {
                    fitCamera();
                    loading.classList.add('hidden');
                    setTimeout(() => loading.remove(), 600);
                }, 500);

            } catch (err) {
                console.error('Failed to load messages:', err);
                createNode('Muck 🐾', 'Memorial', null);
                loading.classList.add('hidden');
            }
        }

        loadMessages();
    </script>
</body>
